name: Mario APP Deployment

on:
  push:

jobs:
  test:
    defaults:
      run:
        working-directory: ./project1
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: Install NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 26
      - name: Install dependencies
        run: npm ci  
      - name: Run app test
        run : npm test
  
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with : 
          node-version: 26
      - name: Install Dependencies
        run: npm ci
      - run: npm build